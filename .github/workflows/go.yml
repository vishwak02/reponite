name: go
on: [push, pull_request]
jobs:
  core:
    name: pure core (default build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  sqlite:
    name: sqlite adapter (-tags sqlite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go get modernc.org/sqlite
      - run: go build -tags sqlite ./...
      - run: go test -tags sqlite ./internal/storage/sqlite/

  treesitter:
    name: tree-sitter parser (-tags treesitter, CGO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go get github.com/smacker/go-tree-sitter github.com/smacker/go-tree-sitter/golang
      - run: go build -tags treesitter ./...
      - run: go test -tags treesitter ./internal/processing/

  mcp:
    name: mcp server (-tags "sqlite mcp")
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go get modernc.org/sqlite github.com/mark3labs/mcp-go
      - run: go build -tags "sqlite mcp" ./...

  e2e:
    name: end-to-end (-tags "sqlite treesitter", CGO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go get modernc.org/sqlite github.com/smacker/go-tree-sitter github.com/smacker/go-tree-sitter/golang
      - run: go build -tags "sqlite treesitter" ./...
      - run: go test -tags "sqlite treesitter" ./internal/e2e/
