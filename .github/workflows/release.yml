name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    env:
      GOFLAGS: -mod=mod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable' # go/types resolver pulls a current golang.org/x/tools
      - run: go get modernc.org/sqlite github.com/smacker/go-tree-sitter github.com/smacker/go-tree-sitter/golang github.com/smacker/go-tree-sitter/python github.com/smacker/go-tree-sitter/javascript github.com/smacker/go-tree-sitter/typescript/typescript github.com/smacker/go-tree-sitter/typescript/tsx github.com/smacker/go-tree-sitter/java github.com/smacker/go-tree-sitter/c github.com/smacker/go-tree-sitter/cpp github.com/smacker/go-tree-sitter/rust github.com/mark3labs/mcp-go github.com/fsnotify/fsnotify github.com/go-git/go-git/v5 golang.org/x/tools
      - name: build
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -tags "sqlite treesitter mcp" -ldflags "-X github.com/vishwak02/reponite/internal/version.Version=${{ github.ref_name }}" -o "reponite-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/reponite
      - uses: softprops/action-gh-release@v2
        with:
          files: reponite-${{ matrix.goos }}-${{ matrix.goarch }}
